services:
  frontend:
    build: ./front
    ports:
      - "80:80"
    depends_on:
      - backend
  backend:
    build: ./server
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017/myshop
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data:
